<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In</title>
  <style>
    /* Reset & Core App Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0d0e12;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 0 24px;
    }

    .container {
      width: 100%;
      max-width: 400px;
      margin-top: 20px;
    }

    /* Header Navigation Bar */
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      height: 56px;
      margin-bottom: 24px;
    }

    .close-btn {
      position: absolute;
      left: 0;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px 0;
    }

    .close-btn svg {
      fill: #ffffff;
      width: 24px;
      height: 24px;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    /* Form Layout */
    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 15px;
      color: #9da3af;
      margin-bottom: 10px;
    }

    /* Inputs and Interactive Elements */
    .input-field {
      width: 100%;
      background-color: #16171d;
      border: 1px solid #282a34;
      border-radius: 8px;
      padding: 16px;
      color: #ffffff;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-field:focus {
      border-color: #2b4cb1;
    }

    .primary-btn {
      width: 100%;
      background-color: #223e93;
      color: #9bb1f1;
      border: none;
      border-radius: 25px;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background-color 0.2s;
    }

    /* Note: If the user types text into the input, a real app would likely 
       brighten this button to #2f5ad8 text color white. */
    .primary-btn:active {
      background-color: #2a4bb4;
    }

    .forgot-link {
      display: block;
      text-align: center;
      color: #9da3af;
      font-size: 13px;
      text-decoration: none;
      margin-top: 24px;
      font-weight: 500;
    }

    /* Divider */
    .divider {
      text-align: center;
      color: #ffffff;
      font-size: 14px;
      font-weight: 700;
      margin: 28px 0;
      letter-spacing: 0.5px;
    }

    /* Secondary Action Buttons */
    .outline-btn {
      width: 100%;
      background-color: transparent;
      border: 1px solid #ffffff;
      border-radius: 8px;
      color: #ffffff;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      margin-bottom: 12px;
    }

    .outline-btn svg {
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
</head>
<body>

  <div class="container">
    <header class="header">
      <button class="close-btn" aria-label="Close">
        <svg viewBox="0 0 24 24">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
      <h1 class="title">Sign in</h1>
    </header>

    <main>
      <div class="form-group">
        <label for="username">Username, email, or phone number</label>
        <input type="text" id="username" class="input-field" autocomplete="off">
      </div>

      <button type="button" class="primary-btn">Next</button>
      
      <a href="#" class="forgot-link">Forgot username?</a>

      <div class="divider">OR</div>

      <button type="button" class="outline-btn">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5M14 9l1.5-1.5M16.5 6.5L19 4m-3.5 6.5L17 9" />
        </svg>
        Use passkey
      </button>

      <button type="button" class="outline-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" stroke-width="2.5">
          <path d="M3 3h6v6H3V3zm12 0h6v6h-6V3zM3 15h6v6H3v-6zm14 0h2v2h-2v-2zm2 2h2v2h-2v-2zm-2 2h2v2h-2v-2zm2-4h2v2h-2v-2zm-4 4h2v2h-2v-2zm0-4h2v2h-2v-2z" />
        </svg>
        Quick sign-in
      </button>
    </main>
  </div>

</body>
</html>
